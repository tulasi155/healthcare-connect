<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bank</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="settings-container">

    <!-- Back Button -->
    <a href="dashboard.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
    </a>

    <!-- Heading -->
    <h1 class="settings-title">
        <i class="fa-solid fa-droplet"></i>
        Blood Bank
    </h1>

    <!-- Search Card -->
    <div class="setting-card ai-card">

        <h3 class="ai-heading">
            Search Blood Availability
        </h3>

        <select class="blood-select" id="bloodGroup">
            <option value="">Select Blood Group</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>
        </select>

        <button class="ai-btn" id="bloodSearchBtn">
            <i class="fa-solid fa-magnifying-glass"></i>
            Search
        </button>

    </div>

    <br>

    <!-- Result Card -->
    <div class="hospital-card">

        <h3>
            <i class="fa-solid fa-heart-circle-check"></i>
            Availability
        </h3>

        <p id="bloodResult">
            Select a blood group and click <strong>Search</strong>.
        </p>

    </div>

    <br>

    <!-- Disclaimer -->
    <div class="ai-disclaimer">

        <i class="fa-solid fa-circle-info"></i>

        Blood availability shown here is for demonstration purposes.
        Please contact the nearest blood bank or hospital for real-time availability.

    </div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
