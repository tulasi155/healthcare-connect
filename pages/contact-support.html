<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="settings-container">

    <a href="dashboard.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Dashboard
    </a>

    <h1 class="settings-title">
        <i class="fa-solid fa-headset"></i>
        Contact Support
    </h1>

    <div class="setting-card ai-card">

        <h3 class="ai-heading">Need Help?</h3>

        <input type="text" id="userName" class="hospital-search" placeholder="Enter your Name">

        <input type="email" id="userEmail" class="hospital-search" placeholder="Enter your Email">

        <textarea id="userMessage"
            placeholder="Describe your issue..."
            style="width:100%;height:150px;padding:15px;border-radius:12px;border:1px solid #ccc;resize:none;font-size:17px;"></textarea>

        <br><br>

        <button class="ai-btn" id="supportBtn">
            <i class="fa-solid fa-paper-plane"></i>
            Send Message
        </button>

    </div>

    <br>

    <div class="ai-disclaimer">

        <i class="fa-solid fa-circle-info"></i>

        Our support team will respond to your query as soon as possible.

    </div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
