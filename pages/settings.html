<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings - Healthcare Connect</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="settings-container">

    <!-- Back Button -->
    <a href="../index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <!-- Heading -->
    <h1 class="settings-title">
        <i class="fa-solid fa-gear"></i>
        Settings
    </h1>

    <div class="settings-list">

        <!-- User Registration -->
        <div class="setting-card" id="registrationCard">
            <i class="fa-solid fa-user"></i>
            <span>User Registration</span>
        </div>

        <!-- Language -->
        <div class="setting-card" id="languageCard">
            <i class="fa-solid fa-language"></i>
            <span>Language Preference</span>
        </div>

        <!-- Help -->
        <div class="setting-card" id="helpCard">
            <i class="fa-solid fa-circle-question"></i>
            <span>Help</span>
        </div>

        <!-- Contact Support -->
        <div class="setting-card" id="supportCard">
            <i class="fa-solid fa-headset"></i>
            <span>Contact Support</span>
        </div>

        <!-- About -->
        <div class="setting-card" id="aboutCard">
            <i class="fa-solid fa-circle-info"></i>
            <span>About Us</span>
        </div>

    </div>

</div>

<!-- JavaScript -->
<script src="../js/script.js"></script>

</body>
</html>
